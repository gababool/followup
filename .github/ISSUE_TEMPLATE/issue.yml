name: Issue
description: Standard issue template
title: "[Task]: "
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done, and why.
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      description: What must be true for this to be considered complete.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: Scope is clear and small enough to complete in one sitting
        - label: No blocking dependencies on other open issues